<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KanbanBoard</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
    <header>
        <div class="filter-container">
            <div class="box red"></div>
            <div class="box blue"></div>
            <div class="box green"></div>
            <div class="box pink"></div>
        </div>
        <div class="action-container">
            <div class="add">
                <i class="fa fa-plus"></i>
            </div>
            <div class="delete">
                <i class="fa fa-trash">
            </i></div>
        </div>
    </header>
    <main>
        <div class="modal">
            <textarea class="task-description" placeholder="Enter Your Task"></textarea>
            <div class="task-priority">
                <div class="priority-color red active"></div>
                <div class="priority-color blue"></div>
                <div class="priority-color green"></div>
                <div class="priority-color pink"></div>
            </div>
        </div>
    </main>
    <script src="./script.js"></script>
</body>
</html>
