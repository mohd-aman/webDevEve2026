<!DOCTYPE html>
<html lang = "en">
  <head>
    <meta charset = "UTF - 8" />
    <meta http-equiv = "X - UA - Compatible" content = "IE = edge" />
    <meta name = "viewport" content = "width = device-width, initial-scale = 1.0" />
    <title>Document</title>
  </head>
  <body>
    <div id = "doubleHolder">
      <button class = "double">double</button>
    </div>

    <script>
      //Q Create a button that is destroyed by clicking on it but two new buttons are created in it's place.
      const container = document.querySelector("#doubleHolder");
      container.addEventListener('click',function(e){
        console.log(e);
        const doesDoubleClassExist = e.target.classList.contains('double');
        if(doesDoubleClassExist){//click happened on button
            e.target.remove();
            const btn1 = document.createElement('button');
            btn1.innerText = 'double';
            btn1.setAttribute('class','double');
            container.append(btn1);
            const btn2 = document.createElement('button');
            btn2.innerText = 'double';
            btn2.setAttribute('class','double');
            container.append(btn2);
        }
      })

    </script>
  </body>
</html>
