<!-- You are given an HTML document containing an unordered list (<ul>) with list items (<li>)
 representing numbers 1 through 10. 
 However, there is an element missing between the numbers 6 and 8. 
 Your task is to identify the missing number in the sequence and 
 insert it appropriately into the list to maintain the sequential order
  using JavaScript. -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF - 8">
    <meta name="viewport" content="width = device - width, initial - scale = 1.0">
    <title>Document</title>
</head>

<body>
    <button>Fix List</button>
    <ul>
        <li>1</li>
        <li>2</li>
        <li>3</li>
        <li>4</li>
        <li>5</li>
        <li>6</li>
        <li>8</li>
        <li>9</li>
        <li>10</li>
    </ul>
</body>
<script>
    const ulElement = document.querySelector("ul");
    const newlyCreatedLiElement = document.createElement('li');
    newlyCreatedLiElement.innerText = '7'
    // console.log(newlyCreatedLiElement);
    // ulElement.appendChild(newlyCreatedLiElement);
    const allLiElement = document.querySelectorAll('li');
    console.log(allLiElement);
    const elementBeforeToAdd = allLiElement[6];

    ulElement.insertBefore(newlyCreatedLiElement,elementBeforeToAdd);

    //during break, right now we are fixing it as sooon as page is loaded, 
    // but now we want to fix it only when user clicks on fix list button
</script>

</html>
